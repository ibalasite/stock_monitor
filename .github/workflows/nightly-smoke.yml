name: Nightly External Smoke

on:
  schedule:
    - cron: "0 16 * * *" # 00:00 Asia/Taipei
  workflow_dispatch:

permissions:
  contents: read

jobs:
  external-smoke:
    runs-on: ubuntu-latest
    env:
      LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN_SANDBOX }}
      LINE_TO_GROUP_ID: ${{ secrets.LINE_TO_GROUP_ID_SANDBOX }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --require-hashes -r requirements-dev.txt

      - name: TWSE endpoint smoke
        run: |
          python scripts/external_dependency_smoke.py --stock-no 2330 --skip-line

      - name: LINE sandbox smoke (optional)
        if: ${{ env.LINE_CHANNEL_ACCESS_TOKEN != '' && env.LINE_TO_GROUP_ID != '' }}
        run: |
          python scripts/external_dependency_smoke.py --line-send --require-line-config --stock-no 2330
