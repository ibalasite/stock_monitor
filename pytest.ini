[pytest]
addopts = --strict-markers --cov=stock_monitor --cov-branch --cov-report=term-missing --cov-fail-under=100
filterwarnings =
    ignore:.*maxsplit.*is passed as positional argument.*:DeprecationWarning:gherkin\.gherkin_line
